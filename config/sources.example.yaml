# Job sources — all VERIFIED working (dead tokens pruned 2026-07-09).
# Two kinds:
#  1. Aggregate/hidden sources: whole feeds where startups post before job boards.
#  2. Company ATS boards: token = slug in the board URL.
# A dead/renamed token logs a failure and is skipped — safe to add guesses; the daily
# report's "source failures" section tells you what to prune.
# The routine ALSO web-searches for fresh hiring posts daily (web_leads -> ingest-leads).

sources:
  # ---- hidden / aggregate sources (high value, lower competition) ----
  - { type: hackernews, company: whoishiring }      # startups post here before job boards
  - { type: remoteok, company: all }
  - { type: weworkremotely, company: programming }
  - { type: weworkremotely, company: fullstack }

