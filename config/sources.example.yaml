# STARTUP-focused sources. No FAANG/big-tech — those pay way above 6-16 LPA and
# aren't what Nithisha wants. These aggregate feeds are startup-heavy by nature and
# work locally (no web-search needed), so the local auto-runner finds real startups.
#
# HN "Who's Hiring" = hundreds of startup posts monthly (many state salary + remote).
# RemoteOK / WeWorkRemotely = remote-first startups, lower India-side competition.
# The salary filter (6-16 LPA) + startup nature of these feeds do the narrowing.

sources:
  - { type: hackernews, company: whoishiring }
  - { type: remoteok, company: all }
  - { type: weworkremotely, company: programming }
  - { type: weworkremotely, company: fullstack }

  # A few genuine startups with public boards (add your own targets here as you find them):
  - { type: lever, company: mistral }
  - { type: ashby, company: elevenlabs }
  - { type: ashby, company: langchain }
  - { type: ashby, company: cursor }
  - { type: ashby, company: modal }
  - { type: lever, company: cred }
