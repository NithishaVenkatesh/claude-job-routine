# Apollo account pool for rotation (BLUEPRINT §18). Copy to
# secrets/apollo_accounts.yaml (git-ignored). NEVER commit real credentials.
#
# CASE A (preferred): if your free tier exposes a REST API key, fill `api_key`.
#   Rotation = swap key on quota/429. Headless-friendly, no browser needed.
# CASE B: if only web login is available, fill `session_file` — a path to a
#   browser session you captured interactively once. Expires; needs periodic
#   manual re-login. Higher ban risk. Cannot fresh-login at 6am unattended.
#
# NOTE: rotating free accounts to evade quotas violates Apollo ToS and may get
# these accounts banned. You accepted this risk (BLUEPRINT §17/§18). The pipeline
# falls back to the legal waterfall (Hunter free + company site) when Apollo fails.

accounts:
  - label: acct1
    api_key: ""            # Case A
    session_file: ""       # Case B (e.g. secrets/apollo_acct1_session.json)
    monthly_cap: 100
  - label: acct2
    api_key: ""
    session_file: ""
    monthly_cap: 100

# Fallback providers (legal, used when all Apollo accounts are exhausted/blocked)
fallback:
  hunter_api_key: ""       # free tier ~25-50 verifications/mo
  enable_company_site_parse: true
